version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-leadgen}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-leadgen123}
      POSTGRES_DB: ${DB_NAME:-leadgen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leadgen-network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - leadgen-network

  chromadb:
    image: chromadb/chroma:latest
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: TRUE
      PERSIST_DIRECTORY: /chroma/chroma
    networks:
      - leadgen-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-leadgen}:${DB_PASSWORD:-leadgen123}@postgres:5432/${DB_NAME:-leadgen}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      APP_ENV: production
    depends_on:
      - postgres
      - redis
      - chromadb
    networks:
      - leadgen-network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-leadgen}:${DB_PASSWORD:-leadgen123}@postgres:5432/${DB_NAME:-leadgen}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - leadgen-network
    deploy:
      replicas: 5
      resources:
        limits:
          memory: 2G

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
    depends_on:
      - api
    networks:
      - leadgen-network

networks:
  leadgen-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chroma_data: